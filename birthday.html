<!DOCTYPE html>
<html>

<head>
<title>Gift for Mona</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3,#ff9a9e);;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button{
    padding:15px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4f81;
    cursor:pointer;
}

#surprise{
    display:none;
    margin-top:30px;
    font-size:22px;
}
</style>

</head>

<body>

<h1>Happy Birthday, Mona baby ❤️</h1>

<button onclick="show()">Click for your surprise 🎁</button>

<div id="surprise">
<p>You are one of the most amazing people in my life.</p>
<p>I'm really lucky to know you, to Love you.</p>
<p>May this year bring you happiness, laughter, and everything you dream about.</p>
<p>Happy Birthday 🎂</p>
</div>

<script>
function show(){
document.getElementById("surprise").style.display="block";
}
</script>

</body>

</html>
